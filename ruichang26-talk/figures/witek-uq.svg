<svg viewBox="0 0 580 340" xmlns="http://www.w3.org/2000/svg" style="background:transparent;">
  <style>
    text { font-family: 'Caveat', 'Georgia', serif; }
  </style>

  <!-- ===== TOP PANEL: 1984 ===== -->
  <rect x="10" y="5" width="560" height="150" fill="none" stroke="#a08060" stroke-width="1.2" stroke-dasharray="5,3" rx="3"/>
  <text x="200" y="24" text-anchor="middle" fill="#648cc8" font-size="15" font-weight="bold">Nuclear theory ~1984</text>

  <!-- pink band (experiment agreement zone) -->
  <rect x="55" y="42" width="320" height="22" fill="rgba(220,130,150,0.15)" rx="2"/>

  <!-- axes -->
  <line x1="55" y1="120" x2="380" y2="120" stroke="#a08060" stroke-width="1.3"/>
  <line x1="55" y1="120" x2="55" y2="35" stroke="#a08060" stroke-width="1.3"/>
  <text x="42" y="80" text-anchor="middle" fill="#a08060" font-size="11" transform="rotate(-90,42,80)" font-style="italic">observable</text>

  <!-- EXP: red circle + error bar with caps -->
  <line x1="100" y1="40" x2="100" y2="66" stroke="#d87070" stroke-width="2"/>
  <line x1="92" y1="40" x2="108" y2="40" stroke="#d87070" stroke-width="2"/>
  <line x1="92" y1="66" x2="108" y2="66" stroke="#d87070" stroke-width="2"/>
  <circle cx="100" cy="53" r="5" fill="#d87070"/>

  <!-- TH1: blue square, near EXP, NO error bar -->
  <rect x="176" y="48" width="10" height="10" fill="#648cc8"/>

  <!-- TH2: blue square, far below, NO error bar -->
  <rect x="256" y="85" width="10" height="10" fill="#648cc8"/>

  <!-- TH3: blue square, medium offset, NO error bar -->
  <rect x="336" y="68" width="10" height="10" fill="#648cc8"/>

  <!-- x-axis labels -->
  <text x="100" y="137" text-anchor="middle" fill="#d87070" font-size="12">EXP</text>
  <text x="181" y="137" text-anchor="middle" fill="#648cc8" font-size="12">TH1</text>
  <text x="261" y="137" text-anchor="middle" fill="#648cc8" font-size="12">TH2</text>
  <text x="341" y="137" text-anchor="middle" fill="#648cc8" font-size="12">TH3</text>

  <!-- annotations -->
  <text x="200" y="44" fill="#78b48c" font-size="11" font-style="italic">← "good model"?</text>
  <text x="275" y="104" fill="#a08060" font-size="11" font-style="italic">← "bad model"?</text>

  <!-- right side question -->
  <text x="400" y="48" fill="#d87070" font-size="13" font-weight="bold">No error bars</text>
  <text x="400" y="65" fill="#d87070" font-size="13" font-weight="bold">on theory!</text>
  <text x="400" y="92" fill="#a08060" font-size="11">How to assess</text>
  <text x="400" y="107" fill="#a08060" font-size="11">which is better?</text>

  <!-- ===== ARROW ===== -->
  <text x="260" y="172" text-anchor="middle" fill="#a08060" font-size="18">⬇</text>

  <!-- ===== BOTTOM PANEL: 2026 ===== -->
  <rect x="10" y="180" width="560" height="155" fill="none" stroke="#a08060" stroke-width="1.2" stroke-dasharray="5,3" rx="3"/>
  <text x="200" y="199" text-anchor="middle" fill="#648cc8" font-size="15" font-weight="bold">Nuclear theory ~2026</text>

  <!-- pink band -->
  <rect x="55" y="216" width="320" height="22" fill="rgba(220,130,150,0.15)" rx="2"/>

  <!-- axes -->
  <line x1="55" y1="300" x2="380" y2="300" stroke="#a08060" stroke-width="1.3"/>
  <line x1="55" y1="300" x2="55" y2="205" stroke="#a08060" stroke-width="1.3"/>
  <text x="42" y="255" text-anchor="middle" fill="#a08060" font-size="11" transform="rotate(-90,42,255)" font-style="italic">observable</text>

  <!-- EXP: red circle + error bar -->
  <line x1="100" y1="214" x2="100" y2="240" stroke="#d87070" stroke-width="2"/>
  <line x1="92" y1="214" x2="108" y2="214" stroke="#d87070" stroke-width="2"/>
  <line x1="92" y1="240" x2="108" y2="240" stroke="#d87070" stroke-width="2"/>
  <circle cx="100" cy="227" r="5" fill="#d87070"/>

  <!-- TH1: LARGE error bar (accurate but imprecise) -->
  <line x1="181" y1="206" x2="181" y2="258" stroke="#648cc8" stroke-width="2"/>
  <line x1="173" y1="206" x2="189" y2="206" stroke="#648cc8" stroke-width="2"/>
  <line x1="173" y1="258" x2="189" y2="258" stroke="#648cc8" stroke-width="2"/>
  <rect x="176" y="227" width="10" height="10" fill="#648cc8"/>
  <text x="181" y="275" text-anchor="middle" fill="#78b48c" font-size="10">accurate</text>
  <text x="181" y="287" text-anchor="middle" fill="#78b48c" font-size="10">imprecise</text>

  <!-- TH2: medium error bar (inaccurate) -->
  <line x1="261" y1="256" x2="261" y2="292" stroke="#648cc8" stroke-width="2"/>
  <line x1="253" y1="256" x2="269" y2="256" stroke="#648cc8" stroke-width="2"/>
  <line x1="253" y1="292" x2="269" y2="292" stroke="#648cc8" stroke-width="2"/>
  <rect x="256" y="269" width="10" height="10" fill="#648cc8"/>
  <text x="261" y="250" text-anchor="middle" fill="#d87070" font-size="10">inaccurate</text>

  <!-- TH3: SMALL error bar (accurate & precise) ✓ -->
  <line x1="341" y1="220" x2="341" y2="240" stroke="#648cc8" stroke-width="2"/>
  <line x1="333" y1="220" x2="349" y2="220" stroke="#648cc8" stroke-width="2"/>
  <line x1="333" y1="240" x2="349" y2="240" stroke="#648cc8" stroke-width="2"/>
  <rect x="336" y="225" width="10" height="10" fill="#648cc8"/>
  <!-- label moved to the right to avoid overlap -->
  <text x="341" y="208" text-anchor="middle" fill="#a082be" font-size="10">accurate &amp; precise ✓</text>

  <!-- x-axis labels -->
  <text x="100" y="316" text-anchor="middle" fill="#d87070" font-size="12">EXP</text>
  <text x="181" y="316" text-anchor="middle" fill="#648cc8" font-size="12">TH1</text>
  <text x="261" y="316" text-anchor="middle" fill="#648cc8" font-size="12">TH2</text>
  <text x="341" y="316" text-anchor="middle" fill="#648cc8" font-size="12">TH3</text>

  <!-- right side conclusion -->
  <text x="400" y="222" fill="#78b48c" font-size="13" font-weight="bold">With error bars</text>
  <text x="400" y="240" fill="#78b48c" font-size="13" font-weight="bold">→ meaningful</text>
  <text x="400" y="258" fill="#78b48c" font-size="13" font-weight="bold">assessment!</text>

  <text x="400" y="285" fill="#a08060" font-size="10">TH1: right direction</text>
  <text x="400" y="298" fill="#a08060" font-size="10">TH2: needs work</text>
  <text x="400" y="311" fill="#a08060" font-size="10">TH3: nailed it ✓</text>
</svg>
