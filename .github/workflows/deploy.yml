name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build all talks
        run: |
          mkdir -p _site
          cp index.html _site/

          for dir in $(find . -maxdepth 2 -name slides.md -exec dirname {} \; | sed 's|^\./||' | sort); do
            echo "::group::Building $dir"
            cd "$dir"
            npm install
            npm run build
            cd ..
            mkdir -p "_site/$dir"
            cp -r "$dir/dist"/* "_site/$dir/"
            echo "::endgroup::"
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
