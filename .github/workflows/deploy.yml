name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build each talk into its own subdirectory
      - name: Build fudan-talk
        run: |
          cd fudan-talk
          npm install
          npx @slidev/cli build --base /talks/fudan-talk/
          cd ..

      - name: Build sjtu-talk
        run: |
          cd sjtu-talk
          npm install
          npx @slidev/cli build --base /talks/sjtu-talk/
          cd ..

      # Assemble the site
      - name: Assemble site
        run: |
          mkdir -p _site/fudan-talk _site/sjtu-talk
          cp index.html _site/
          cp -r fudan-talk/dist/* _site/fudan-talk/
          cp -r sjtu-talk/dist/* _site/sjtu-talk/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
